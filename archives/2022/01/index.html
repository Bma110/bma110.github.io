        //字符串分组
        function group(str, len) {
          var r = [];
          function doGroup(s) {
            if (!s) return;
            r.push(s.substr(0, len));
            s = s.substr(len);
            doGroup(s)
          }
          doGroup(str);
          return r;
        }
    
        //播放函数
        function PalyAudio(type) {
    
          if (type == 1) {
            GetAudioArray();
           // ForPalyAudio(0);
          
          } else if (type == 2) {
    
            //停止
            window.speechSynthesis.pause();
          } else if(type == 3){
            window.speechSynthesis.resume();
          }else if(type == 4){
            window.speechSynthesis.cancel();
          }else{
            alert("错误的类型");
          }
        }
